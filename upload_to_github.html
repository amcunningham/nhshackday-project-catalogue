async function doUpload() {
  document.getElementById('status').textContent = 'Uploading... please wait';
  document.getElementById('btn').disabled = true;
  try {
    const resp = await fetch('https://api.github.com/repos/amcunningham/nhshackday-project-catalogue/contents/index.html', {
      method: 'PUT',
      headers: {
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Update catalogue with Junior Doctor Handover category',
        content: B64,
        sha: SHA
      })
    });
    const data = await resp.json();
    if (resp.ok) {
      document.getElementById('status').innerHTML = '<b>Success!</b> Catalogue updated on GitHub. You can close this page.';
      document.getElementById('status').style.color = 'green';
    } else {
      document.getElementById('status').textContent = 'Error ' + resp.status + ': ' + (data.message || 'Unknown error');
      document.getElementById('status').style.color = 'red';
      document.getElementById('btn').disabled = false;
    }
  } catch(e) {
    document.getElementById('status').textContent = 'Network error: ' + e.message;
    document.getElementById('status').style.color = 'red';
    document.getElementById('btn').disabled = false;
  }
}
</script>
